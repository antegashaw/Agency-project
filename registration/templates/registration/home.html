<!DOCTYPE html>
{% load static %}  <!-- ይሄ መስመር የግድ መኖር አለበት -->

<header>
    <!-- ምስል ለመጥራት -->
    <img src="{% static 'logo.png'%">
    
    <!-- CSS ለመጥራት -->
    <link rel="stylesheet" href="{% static 'style.css' %}">
</header>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>አል-አሚን ወኪል ኤጀንሲ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
            text-align: center;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 40px 20px;
        }
        header h1 {
            margin: 0;
            font-size: 2.5rem;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        p {
            font-size: 1.2rem;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background-color: #27ae60;
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #219653;
        }
    </style>
</head>
<body>

    <header>
        <h1>አል-አሚን የሠራተኛና አሠሪ አገናኝ ኤጀንሲ</h1>
    </header>

    <div class="container">
        <h2>እንኳን ወደ ድረ-ገጻችን በሰላም መጡ!</h2>
        <p>ኤጀንሲያችን ታማኝ እና ብቁ የሆኑ ሠራተኞችን ከታማኝ አሠሪዎች ጋር በልዩ ጥራት ያገናኛል። አሁን መመዝገብ ከፈለጉ ከታች ያለውን ቁልፍ ተጭነው ማመልከቻ ቅጹን ይሙሉ::</p>
        
        <a href="/apply/" class="btn-register">Sign up now / አሁኑኑ ይመዝገቡ</a>
    </div>

</body>
</html>
