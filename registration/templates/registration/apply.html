<body>

<div class="form-container">
    <h2>የወኪል ኤጀንሲ ሰራተኛ መመዝገቢያ</h2>
    
    {% if messages %}
        {% for message in messages %}
            <div class="message">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %} {{ form.as_p }}
        
        <button type="submit">መረጃውን ላክ (Register)</button>
    </form>
</div>

</body>
